[data]
dataset = "C:/path/to/Combined_Drawing"
validation_split = "valid"

[training]
model = "resnet18"
pretrained_weights = "DEFAULT"
seed = 42
image_size = 224
batch_size = 16
epochs = 50
device = "auto"
workers = 4
augmentation = "conservative"
freeze_epochs = 3
class_weighting = true
early_stopping_patience = 7

[optimization]
optimizer = "adamw"
head_learning_rate = 0.0003
backbone_learning_rate = 0.0001
scheduler = "reduce_on_plateau"

[output]
directory = "outputs/experiments/resnet18_seed42"
calibration = "temperature_scaling"
